<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Blockcraft Menu</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    canvas {
      display: block;
    }

    .ui {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .title {
      color: white;
      font-family: Arial Black, sans-serif;
      font-size: clamp(42px, 7vw, 96px);
      text-shadow:
        4px 4px 0 #444,
        8px 8px 0 rgba(0,0,0,0.3);
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .splash {
      color: #ffeb3b;
      font-family: Arial Black, sans-serif;
      font-size: clamp(14px, 2vw, 28px);
      transform: rotate(-12deg);
      text-shadow: 2px 2px 0 #000;
      margin-bottom: 28px;
      animation: pulse 1.5s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: rotate(-12deg) scale(1); }
      50% { transform: rotate(-12deg) scale(1.08); }
    }

    .menu {
      width: min(420px, 86vw);
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: auto;
    }

    .btn {
      background: linear-gradient(to bottom, #bdbdbd, #7e7e7e);
      border: 3px solid #444;
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.3),
        inset 0 -2px 0 rgba(0,0,0,0.25);
      color: white;
      font-family: Arial Black, sans-serif;
      font-size: clamp(16px, 2vw, 24px);
      text-shadow: 2px 2px 0 #000;
      padding: 14px;
      cursor: pointer;
    }

    .btn:hover {
      filter: brightness(1.1);
    }

    .btn:active {
      transform: translateY(2px);
    }

    .footer-left, .footer-right {
      position: fixed;
      bottom: 10px;
      color: white;
      font-size: 13px;
      font-family: sans-serif;
      text-shadow: 1px 1px 0 #000;
      pointer-events: none;
    }

    .footer-left { left: 12px; }
    .footer-right { right: 12px; }
  </style>
</head>
<body>
  <div class="ui">
    <div class="title">BLOCKCRAFT</div>
    <div class="splash" id="splash">Now with real blocks!</div>

    <div class="menu">
      <button class="btn" onclick="alert('Singleplayer')">Singleplayer</button>
      <button class="btn" onclick="alert('Multiplayer')">Multiplayer</button>
      <button class="btn" onclick="alert('Options')">Options</button>
      <button class="btn" onclick="alert('Quit Game')">Quit Game</button>
    </div>
  </div>

  <div class="footer-left">Blockcraft Clone v0.2</div>
  <div class="footer-right">Voxel Panorama Menu</div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    const splashes = [
      "Now with real blocks!",
      "No bridge photos included!",
      "100% more cubic!",
      "Procedurally tasty!",
      "Grass sold separately!"
    ];
    document.getElementById("splash").textContent =
      splashes[Math.floor(Math.random() * splashes.length)];

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.prepend(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87c6ff);
    scene.fog = new THREE.Fog(0x87c6ff, 30, 90);

    const camera = new THREE.PerspectiveCamera(
      70,
      window.innerWidth / window.innerHeight,
      0.1,
      500
    );

    // Menu panorama camera position
    camera.position.set(0, 12, 0);

    const ambient = new THREE.AmbientLight(0xffffff, 0.75);
    scene.add(ambient);

    const sun = new THREE.DirectionalLight(0xffffff, 0.9);
    sun.position.set(30, 50, 20);
    scene.add(sun);

    const world = new THREE.Group();
    scene.add(world);

    const cubeGeo = new THREE.BoxGeometry(1, 1, 1);

    const materials = {
      grass: new THREE.MeshLambertMaterial({ color: 0x4cba3c }),
      dirt: new THREE.MeshLambertMaterial({ color: 0x8a5a2b }),
      stone: new THREE.MeshLambertMaterial({ color: 0x7d7d7d }),
      wood: new THREE.MeshLambertMaterial({ color: 0x6b4a2b }),
      leaves: new THREE.MeshLambertMaterial({ color: 0x2e8b3c }),
      water: new THREE.MeshLambertMaterial({
        color: 0x3a7bd5,
        transparent: true,
        opacity: 0.8
      })
    };

    function block(x, y, z, mat) {
      const mesh = new THREE.Mesh(cubeGeo, mat);
      mesh.position.set(x, y, z);
      world.add(mesh);
    }

    // Simple terrain height function
    function heightAt(x, z) {
      return Math.floor(
        6
        + Math.sin(x * 0.22) * 2
        + Math.cos(z * 0.18) * 2
        + Math.sin((x + z) * 0.12) * 2
      );
    }

    const size = 40;
    const waterLevel = 5;

    for (let x = -size; x <= size; x++) {
      for (let z = -size; z <= size; z++) {
        const h = heightAt(x, z);

        for (let y = 0; y <= h; y++) {
          if (y === h) {
            block(x, y, z, h <= waterLevel ? materials.sand || materials.dirt : materials.grass);
          } else if (y > h - 3) {
            block(x, y, z, materials.dirt);
          } else {
            block(x, y, z, materials.stone);
          }
        }

        // Water
        if (h < waterLevel) {
          for (let y = h + 1; y <= waterLevel; y++) {
            block(x, y, z, materials.water);
          }
        }

        // Trees
        const canTree =
          h > waterLevel + 1 &&
          Math.random() < 0.015 &&
          Math.abs(x) > 4 &&
          Math.abs(z) > 4;

        if (canTree) {
          const trunkHeight = 4 + Math.floor(Math.random() * 2);

          for (let y = h + 1; y <= h + trunkHeight; y++) {
            block(x, y, z, materials.wood);
          }

          for (let lx = -2; lx <= 2; lx++) {
            for (let lz = -2; lz <= 2; lz++) {
              for (let ly = trunkHeight - 1; ly <= trunkHeight + 1; ly++) {
                if (Math.abs(lx) + Math.abs(lz) < 4) {
                  block(x + lx, h + ly, z + lz, materials.leaves);
                }
              }
            }
          }

          block(x, h + trunkHeight + 2, z, materials.leaves);
        }
      }
    }

    // Center clearing so menu sees open terrain
    const clearRadius = 6;
    world.children = world.children.filter(mesh => {
      const { x, z, y } = mesh.position;
      if (Math.abs(x) < clearRadius && Math.abs(z) < clearRadius && y > 6) {
        world.remove(mesh);
        return false;
      }
      return true;
    });

    let t = 0;
    function animate() {
      requestAnimationFrame(animate);
      t += 0.003;

      // Minecraft-like panorama sweep
      camera.rotation.order = "YXZ";
      camera.rotation.y = t * 0.25;
      camera.rotation.x = -0.15 + Math.sin(t * 0.7) * 0.03;

      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
