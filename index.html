<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Blockcraft Menu</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }

    canvas {
      display: block;
    }

    /* UI overlay */
    .ui {
      position: fixed;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .title {
      pointer-events: none;
      color: white;
      font-family: Arial Black, sans-serif;
      font-size: clamp(40px, 6vw, 80px);
      text-shadow:
        3px 3px 0 #3a3a3a,
        6px 6px 0 rgba(0,0,0,0.35);
      margin-bottom: 6px;
      letter-spacing: 2px;
    }

    .splash {
      pointer-events: none;
      color: #ffeb3b;
      font-family: Arial Black, sans-serif;
      font-size: clamp(14px, 2vw, 28px);
      transform: rotate(-12deg);
      text-shadow: 2px 2px 0 #000;
      margin-bottom: 28px;
      animation: pulse 1.6s infinite ease-in-out;
    }

    @keyframes pulse {
      0%, 100% { transform: rotate(-12deg) scale(1); }
      50% { transform: rotate(-12deg) scale(1.08); }
    }

    .menu {
      width: min(420px, 86vw);
      display: flex;
      flex-direction: column;
      gap: 12px;
      pointer-events: auto;
    }

    .btn {
      background: linear-gradient(to bottom, #a6a6a6, #6d6d6d);
      border: 3px solid #3f3f3f;
      box-shadow:
        inset 0 2px 0 rgba(255,255,255,0.25),
        inset 0 -2px 0 rgba(0,0,0,0.25);
      color: white;
      font-family: Arial Black, sans-serif;
      font-size: clamp(16px, 2vw, 24px);
      padding: 14px 18px;
      text-shadow: 2px 2px 0 #000;
      cursor: pointer;
      user-select: none;
    }

    .btn:hover {
      filter: brightness(1.12);
    }

    .btn:active {
      transform: translateY(2px);
    }

    .footer-left, .footer-right {
      position: fixed;
      bottom: 10px;
      color: white;
      font-family: sans-serif;
      font-size: 13px;
      text-shadow: 1px 1px 0 #000;
      pointer-events: none;
    }

    .footer-left { left: 12px; }
    .footer-right { right: 12px; }

    .fade {
      position: fixed;
      inset: 0;
      background: black;
      opacity: 0;
      pointer-events: none;
      transition: opacity 350ms ease;
    }
  </style>
</head>
<body>
  <div class="ui">
    <div class="title">BLOCKCRAFT</div>
    <div class="splash" id="splash">Now with panorama!</div>

    <div class="menu">
      <button class="btn" id="singleBtn">Singleplayer</button>
      <button class="btn" id="multiBtn">Multiplayer</button>
      <button class="btn" id="optionsBtn">Options</button>
      <button class="btn" id="quitBtn">Quit Game</button>
    </div>
  </div>

  <div class="footer-left">Blockcraft Clone v0.1</div>
  <div class="footer-right">WebGL + Three.js Menu</div>
  <div class="fade" id="fade"></div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    // -------------------------
    // Splash text
    // -------------------------
    const splashes = [
      "Now with panorama!",
      "Totally not Minecraft!",
      "Chunky and proud!",
      "Powered by cubes!",
      "Infinite terrain sold separately!",
      "Procedurally menu'd!"
    ];
    document.getElementById("splash").textContent =
      splashes[Math.floor(Math.random() * splashes.length)];

    // -------------------------
    // Renderer / Scene / Camera
    // -------------------------
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.prepend(renderer.domElement);

    const scene = new THREE.Scene();

    // Camera sits in the middle of the panorama cube
    const camera = new THREE.PerspectiveCamera(
      70,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 0, 0.01);

    // -------------------------
    // Panorama skybox
    // -------------------------
    // Replace these with your own six panorama images if you want.
    // Order: px, nx, py, ny, pz, nz
    const loader = new THREE.CubeTextureLoader();

    // Example placeholder set from three.js examples.
    // You can swap to your own /panorama/ folder:
    // [
    //   "panorama/px.jpg", "panorama/nx.jpg",
    //   "panorama/py.jpg", "panorama/ny.jpg",
    //   "panorama/pz.jpg", "panorama/nz.jpg"
    // ]
    const cubeTexture = loader.load([
      "https://threejs.org/examples/textures/cube/Bridge2/posx.jpg",
      "https://threejs.org/examples/textures/cube/Bridge2/negx.jpg",
      "https://threejs.org/examples/textures/cube/Bridge2/posy.jpg",
      "https://threejs.org/examples/textures/cube/Bridge2/negy.jpg",
      "https://threejs.org/examples/textures/cube/Bridge2/posz.jpg",
      "https://threejs.org/examples/textures/cube/Bridge2/negz.jpg"
    ]);

    scene.background = cubeTexture;

    // Optional dark overlay "fog" effect with translucent sphere
    const overlayGeo = new THREE.SphereGeometry(40, 32, 32);
    const overlayMat = new THREE.MeshBasicMaterial({
      color: 0x000000,
      transparent: true,
      opacity: 0.18,
      side: THREE.BackSide
    });
    const overlaySphere = new THREE.Mesh(overlayGeo, overlayMat);
    scene.add(overlaySphere);

    // -------------------------
    // Simple fake "blocky world silhouettes"
    // -------------------------
    const group = new THREE.Group();
    scene.add(group);

    const boxGeo = new THREE.BoxGeometry(1, 1, 1);

    function addTower(x, y, z, h, color) {
      for (let i = 0; i < h; i++) {
        const mat = new THREE.MeshLambertMaterial({ color });
        const cube = new THREE.Mesh(boxGeo, mat);
        cube.position.set(x, y + i, z);
        group.add(cube);
      }
    }

    // Ground-ish chunks near horizon
    for (let x = -10; x <= 10; x += 2) {
      for (let z = -10; z <= 10; z += 2) {
        const height = Math.floor(Math.random() * 3) + 1;
        addTower(x, -4, z - 18, height, 0x4f8a3c);
      }
    }

    // A few taller "trees"/shapes
    addTower(-6, -3, -14, 5, 0x6b4f2a);
    addTower(6, -3, -16, 6, 0x6b4f2a);
    addTower(-6, 2, -14, 3, 0x2e6b2e);
    addTower(-5, 2, -14, 3, 0x2e6b2e);
    addTower(6, 3, -16, 3, 0x2e6b2e);
    addTower(7, 3, -16, 3, 0x2e6b2e);

    // Lighting
    const ambient = new THREE.AmbientLight(0xffffff, 0.8);
    scene.add(ambient);

    const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
    dirLight.position.set(5, 8, 2);
    scene.add(dirLight);

    // -------------------------
    // Animation
    // -------------------------
    let time = 0;

    function animate() {
      requestAnimationFrame(animate);
      time += 0.003;

      // Slow panorama-like camera sweep
      camera.rotation.order = "YXZ";
      camera.rotation.y = Math.sin(time * 0.6) * 0.35 + time * 0.12;
      camera.rotation.x = Math.sin(time * 0.9) * 0.04;

      // Slight world drift for extra menu ambiance
      group.rotation.y = time * 0.08;

      renderer.render(scene, camera);
    }
    animate();

    // -------------------------
    // Resize
    // -------------------------
    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // -------------------------
    // Button actions
    // -------------------------
    const fade = document.getElementById("fade");

    function fakeTransition(label) {
      console.log(label);
      fade.style.opacity = "0.55";
      setTimeout(() => {
        alert(label);
        fade.style.opacity = "0";
      }, 250);
    }

    document.getElementById("singleBtn").addEventListener("click", () => {
      fakeTransition("Open Singleplayer Menu");
    });

    document.getElementById("multiBtn").addEventListener("click", () => {
      fakeTransition("Open Multiplayer Menu");
    });

    document.getElementById("optionsBtn").addEventListener("click", () => {
      fakeTransition("Open Options Menu");
    });

    document.getElementById("quitBtn").addEventListener("click", () => {
      fakeTransition("Quit Game");
    });
  </script>
</body>
</html>
